<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0"/>
    <title>取名</title>
    <link rel="stylesheet" type="text/css" href="css/reset.css">
    <link rel="stylesheet" type="text/css" href="css/wall.css">
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        
        body {
            background: linear-gradient(135deg, #FFF1EB 0%, #ACE0F9 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(60px);
        }
        
        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #FFD1DC, #FFB6C1);
            top: -100px;
            right: -100px;
            animation: circleFloat 12s ease-in-out infinite;
        }
        
        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #B5EAD7, #98D8C8);
            bottom: -50px;
            left: -50px;
            animation: circleFloat 15s ease-in-out infinite reverse;
        }
        
        .bg-circle-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #C7CEEA, #B8B8D1);
            top: 40%;
            left: 60%;
            animation: circleFloat 10s ease-in-out infinite 2s;
        }
        
        @keyframes circleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(-30px, -10px) scale(1.02); }
        }
        
        .clouds-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.5);
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }
        
        .cloud-1 {
            width: 120px;
            height: 50px;
            top: 8%;
            left: -150px;
            animation: cloudFloat 30s linear infinite;
        }
        .cloud-1::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 20px;
        }
        .cloud-1::after {
            width: 70px;
            height: 70px;
            top: -40px;
            left: 50px;
        }
        
        .cloud-2 {
            width: 100px;
            height: 40px;
            top: 20%;
            left: -120px;
            animation: cloudFloat 35s linear infinite 8s;
        }
        .cloud-2::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }
        .cloud-2::after {
            width: 55px;
            height: 55px;
            top: -30px;
            left: 40px;
        }
        
        .cloud-3 {
            width: 140px;
            height: 55px;
            top: 55%;
            left: -170px;
            animation: cloudFloat 40s linear infinite 15s;
        }
        .cloud-3::before {
            width: 70px;
            height: 70px;
            top: -35px;
            left: 25px;
        }
        .cloud-3::after {
            width: 80px;
            height: 80px;
            top: -45px;
            left: 60px;
        }
        
        @keyframes cloudFloat {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 250px)); }
        }
        
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .bubble {
            position: absolute;
            bottom: -60px;
            border-radius: 50%;
            box-shadow: inset -3px -3px 10px rgba(255, 255, 255, 0.8),
                        inset 3px 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .bubble-1 {
            width: 25px;
            height: 25px;
            left: 8%;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.7), rgba(255, 192, 203, 0.5));
            animation: bubbleRise 10s ease-in-out infinite;
        }
        
        .bubble-2 {
            width: 35px;
            height: 35px;
            left: 22%;
            background: linear-gradient(135deg, rgba(152, 216, 200, 0.7), rgba(181, 234, 215, 0.5));
            animation: bubbleRise 12s ease-in-out infinite 2s;
        }
        
        .bubble-3 {
            width: 20px;
            height: 20px;
            left: 40%;
            background: linear-gradient(135deg, rgba(224, 187, 228, 0.7), rgba(212, 165, 217, 0.5));
            animation: bubbleRise 9s ease-in-out infinite 4s;
        }
        
        .bubble-4 {
            width: 30px;
            height: 30px;
            left: 58%;
            background: linear-gradient(135deg, rgba(253, 253, 150, 0.7), rgba(255, 245, 186, 0.5));
            animation: bubbleRise 11s ease-in-out infinite 1s;
        }
        
        .bubble-5 {
            width: 22px;
            height: 22px;
            left: 75%;
            background: linear-gradient(135deg, rgba(174, 217, 224, 0.7), rgba(184, 224, 240, 0.5));
            animation: bubbleRise 13s ease-in-out infinite 3s;
        }
        
        .bubble-6 {
            width: 28px;
            height: 28px;
            left: 88%;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.7), rgba(255, 209, 220, 0.5));
            animation: bubbleRise 10s ease-in-out infinite 5s;
        }
        
        @keyframes bubbleRise {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }
        
        .sparkles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
        }
        
        .sparkle::before, .sparkle::after {
            content: '';
            position: absolute;
            background: #FFD700;
            border-radius: 50%;
        }
        
        .sparkle::before {
            width: 2px;
            height: 16px;
            left: 2px;
            top: -5px;
            background: linear-gradient(to bottom, transparent, #FFD700, transparent);
        }
        
        .sparkle::after {
            width: 16px;
            height: 2px;
            left: -5px;
            top: 2px;
            background: linear-gradient(to right, transparent, #FFD700, transparent);
        }
        
        .sparkle-1 { top: 12%; left: 15%; animation-delay: 0s; }
        .sparkle-2 { top: 22%; left: 85%; animation-delay: 0.4s; }
        .sparkle-3 { top: 38%; left: 8%; animation-delay: 0.8s; }
        .sparkle-4 { top: 52%; left: 92%; animation-delay: 1.2s; }
        .sparkle-5 { top: 68%; left: 25%; animation-delay: 0.2s; }
        .sparkle-6 { top: 78%; left: 75%; animation-delay: 0.6s; }
        .sparkle-7 { top: 45%; left: 50%; animation-delay: 1s; }
        .sparkle-8 { top: 85%; left: 40%; animation-delay: 1.4s; }
        
        @keyframes sparkleAnim {
            0%, 100% { 
                opacity: 0.2; 
                transform: scale(0.6) rotate(0deg); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.3) rotate(180deg); 
            }
        }
        
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }
        
        .floating-heart {
            position: absolute;
            font-size: 16px;
            animation: heartFloat 5s ease-in-out infinite;
        }
        
        .heart-1 { left: 5%; top: 25%; animation-delay: 0s; }
        .heart-2 { left: 12%; top: 65%; animation-delay: 1s; }
        .heart-3 { left: 88%; top: 18%; animation-delay: 2s; }
        .heart-4 { left: 95%; top: 55%; animation-delay: 0.5s; }
        .heart-5 { left: 50%; top: 82%; animation-delay: 1.5s; }
        .heart-6 { left: 30%; top: 90%; animation-delay: 2.5s; }
        
        @keyframes heartFloat {
            0%, 100% { 
                transform: translateY(0) rotate(-8deg) scale(1); 
                opacity: 0.4; 
            }
            50% { 
                transform: translateY(-20px) rotate(8deg) scale(1.15); 
                opacity: 0.8; 
            }
        }
        
        .ponies-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        
        .pony {
            position: absolute;
            font-size: 28px;
            animation: ponyRun 20s linear infinite;
        }
        
        .pony-1 {
            bottom: 15%;
            left: -60px;
            animation-delay: 0s;
        }
        
        .pony-2 {
            bottom: 25%;
            left: -60px;
            animation-delay: 8s;
            font-size: 24px;
        }
        
        .pony-3 {
            bottom: 8%;
            left: -60px;
            animation-delay: 15s;
            font-size: 22px;
        }
        
        @keyframes ponyRun {
            0% {
                transform: translateX(0) scaleX(1);
                opacity: 0.9;
            }
            5% {
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                transform: translateX(calc(100vw + 100px)) scaleX(1);
                opacity: 0.9;
            }
        }
        
        .pony-bounce {
            animation: ponyRun 18s linear infinite, ponyBounce 0.4s ease-in-out infinite;
        }
        
        @keyframes ponyBounce {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(0) translateY(-8px); }
        }
        
        .flying-pony {
            position: absolute;
            font-size: 22px;
            animation: flyingPony 12s ease-in-out infinite;
        }
        
        .flying-pony-1 {
            top: 35%;
            left: -50px;
            animation-delay: 0s;
        }
        
        .flying-pony-2 {
            top: 50%;
            left: -50px;
            animation-delay: 6s;
        }
        
        @keyframes flyingPony {
            0% {
                transform: translateX(0) translateY(0) rotate(-5deg);
                opacity: 0.7;
            }
            25% {
                transform: translateX(25vw) translateY(-30px) rotate(5deg);
                opacity: 1;
            }
            50% {
                transform: translateX(50vw) translateY(0) rotate(-5deg);
                opacity: 0.8;
            }
            75% {
                transform: translateX(75vw) translateY(-25px) rotate(5deg);
                opacity: 1;
            }
            100% {
                transform: translateX(calc(100vw + 60px)) translateY(0) rotate(-5deg);
                opacity: 0.7;
            }
        }
        
        .hoofprints-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }
        
        .hoofprint {
            position: absolute;
            font-size: 14px;
            opacity: 0.15;
            animation: hoofprintPulse 4s ease-in-out infinite;
        }
        
        .hoofprint-1 { top: 18%; left: 12%; animation-delay: 0s; }
        .hoofprint-2 { top: 22%; left: 18%; animation-delay: 0.3s; }
        .hoofprint-3 { top: 26%; left: 14%; animation-delay: 0.6s; }
        .hoofprint-4 { top: 75%; left: 85%; animation-delay: 0.2s; }
        .hoofprint-5 { top: 80%; left: 90%; animation-delay: 0.5s; }
        .hoofprint-6 { top: 78%; left: 82%; animation-delay: 0.8s; }
        .hoofprint-7 { top: 45%; left: 5%; animation-delay: 0.4s; }
        .hoofprint-8 { top: 50%; left: 8%; animation-delay: 0.7s; }
        
        @keyframes hoofprintPulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.1); }
        }
        
        .pony-stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7;
        }
        
        .pony-star {
            position: absolute;
            font-size: 12px;
            animation: ponyStarFloat 3s ease-in-out infinite;
        }
        
        .pony-star-1 { top: 20%; left: 25%; animation-delay: 0s; }
        .pony-star-2 { top: 35%; left: 75%; animation-delay: 0.5s; }
        .pony-star-3 { top: 60%; left: 15%; animation-delay: 1s; }
        .pony-star-4 { top: 70%; left: 80%; animation-delay: 1.5s; }
        
        @keyframes ponyStarFloat {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1); 
                opacity: 0.5; 
            }
            50% { 
                transform: translateY(-15px) rotate(180deg) scale(1.3); 
                opacity: 1; 
            }
        }
        
        .rainbow {
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 200%;
            height: 100%;
            background: conic-gradient(
                from 180deg,
                transparent 0deg,
                rgba(255, 182, 193, 0.1) 30deg,
                rgba(255, 218, 185, 0.1) 60deg,
                rgba(255, 255, 186, 0.1) 90deg,
                rgba(186, 255, 201, 0.1) 120deg,
                rgba(186, 225, 255, 0.1) 150deg,
                rgba(221, 186, 255, 0.1) 180deg,
                transparent 180deg
            );
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
            animation: rainbowPulse 6s ease-in-out infinite;
        }
        
        @keyframes rainbowPulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.7; transform: translateX(-50%) scale(1.05); }
        }
        
        #main {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            transition: all 1s;
        }
        
        #main.mask {
            filter: blur(4px);
            opacity: 0.6;
        }
        
        .result {
            position: absolute;
            width: 100%;
            left: 0;
            top: 35%;
            transform: translateY(-50%);
            text-align: center;
            padding: 20px;
            display: none;
            z-index: 100;
        }
        
        .result-name {
            font-size: 56px;
            font-weight: bold;
            color: #FF6B9D;
            text-shadow: 
                3px 3px 0 #FFE4EC,
                6px 6px 0 rgba(255, 107, 157, 0.25);
            margin-bottom: 30px;
            letter-spacing: 8px;
            animation: nameAppear 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes nameAppear {
            0% { 
                transform: scale(0) rotate(-10deg); 
                opacity: 0; 
            }
            50% { 
                transform: scale(1.2) rotate(5deg); 
            }
            70% { 
                transform: scale(0.9) rotate(-3deg); 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1; 
            }
        }
        
        .result-desc {
            position: relative;
            font-size: 17px;
            color: #555;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(255, 250, 250, 0.95));
            padding: 24px 32px;
            border-radius: 30px;
            display: inline-block;
            max-width: 85%;
            line-height: 2;
            box-shadow: 
                0 15px 50px rgba(255, 182, 193, 0.35),
                0 8px 25px rgba(0, 0, 0, 0.06),
                inset 0 2px 10px rgba(255, 255, 255, 0.8);
            border: 3px solid rgba(255, 182, 193, 0.5);
            animation: descAppear 0.6s ease-out 0.3s both;
        }
        
        .result-desc::before {
            content: '🐴';
            position: absolute;
            top: -40px;
            left: 0px;
            font-size: 48px;
            animation: emojiBounce 1.5s ease-in-out infinite;
        }
        
        .result-desc::after {
            content: '🦄';
            position: absolute;
            bottom: -15px;
            right: 25px;
            font-size: 24px;
            animation: emojiBounce 1.5s ease-in-out infinite 0.5s;
        }
        
        @keyframes descAppear {
            0% { 
                transform: translateY(30px) scale(0.9); 
                opacity: 0; 
            }
            100% { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
        }
        
        @keyframes emojiBounce {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.2); }
        }
        
        .tools {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .toggle-btn-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .tools .toggle-btn {
            position: relative;
            font-size: 22px;
            padding: 0;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            font-weight: bold;
            border: none;
            color: white;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            letter-spacing: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: btnPulse 3s ease-in-out infinite;
        }
        
        .tools .toggle-btn.button-secondary {
            background: linear-gradient(145deg, #FF9A9E, #FECFEF, #FFDDE1);
            box-shadow: 
                0 15px 40px rgba(255, 154, 158, 0.45),
                0 8px 25px rgba(254, 207, 239, 0.35),
                inset 0 -5px 15px rgba(0, 0, 0, 0.06),
                inset 0 5px 15px rgba(255, 255, 255, 0.5);
        }
        
        .tools .toggle-btn.button-success {
            background: linear-gradient(145deg, #98D8C8, #B5EAD7, #A8E6CF);
            box-shadow: 
                0 15px 40px rgba(152, 216, 200, 0.45),
                0 8px 25px rgba(181, 234, 215, 0.35),
                inset 0 -5px 15px rgba(0, 0, 0, 0.06),
                inset 0 5px 15px rgba(255, 255, 255, 0.5);
        }
        
        @keyframes btnPulse {
            0%, 100% { 
                transform: scale(1); 
            }
            50% { 
                transform: scale(1.03); 
            }
        }
        
        .tools .toggle-btn:hover {
            transform: scale(1.1);
            animation: none;
        }
        
        .tools .toggle-btn.button-secondary:hover {
            box-shadow: 
                0 20px 50px rgba(255, 154, 158, 0.55),
                0 12px 35px rgba(254, 207, 239, 0.45),
                inset 0 -5px 15px rgba(0, 0, 0, 0.06),
                inset 0 5px 15px rgba(255, 255, 255, 0.5);
        }
        
        .tools .toggle-btn.button-success:hover {
            box-shadow: 
                0 20px 50px rgba(152, 216, 200, 0.55),
                0 12px 35px rgba(181, 234, 215, 0.45),
                inset 0 -5px 15px rgba(0, 0, 0, 0.06),
                inset 0 5px 15px rgba(255, 255, 255, 0.5);
        }
        
        .tools .toggle-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        
        .tools .toggle-btn .btn-icon {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.2));
            transition: transform 0.3s ease;
        }
        
        .tools .toggle-btn:hover .btn-icon {
            transform: scale(1.1);
        }
        
        .tools .toggle-btn .btn-text {
            font-size: 20px;
            font-weight: 600;
        }
        
        .btn-decorations {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            pointer-events: none;
        }
        
        .btn-decoration {
            position: absolute;
            font-size: 18px;
            animation: decorOrbit 4s ease-in-out infinite;
        }
        
        .btn-decoration:nth-child(1) {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }
        
        .btn-decoration:nth-child(2) {
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            animation-delay: 1s;
        }
        
        .btn-decoration:nth-child(3) {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 2s;
        }
        
        .btn-decoration:nth-child(4) {
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            animation-delay: 3s;
        }
        
        @keyframes decorOrbit {
            0%, 100% { 
                transform: translateY(0) scale(1) rotate(0deg); 
                opacity: 0.6; 
            }
            25% { 
                transform: translateY(-15px) scale(1.3) rotate(90deg); 
                opacity: 1; 
            }
            50% { 
                transform: translateY(0) scale(1) rotate(180deg); 
                opacity: 0.6; 
            }
            75% { 
                transform: translateY(15px) scale(1.3) rotate(270deg); 
                opacity: 1; 
            }
        }
        
        .btn-decoration:nth-child(1) { animation-name: decorOrbit1; }
        .btn-decoration:nth-child(2) { animation-name: decorOrbit2; }
        .btn-decoration:nth-child(3) { animation-name: decorOrbit3; }
        .btn-decoration:nth-child(4) { animation-name: decorOrbit4; }
        
        @keyframes decorOrbit1 {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) translateY(-20px) scale(1.4); opacity: 1; }
        }
        
        @keyframes decorOrbit2 {
            0%, 100% { transform: translateY(-50%) translateX(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-50%) translateX(20px) scale(1.4); opacity: 1; }
        }
        
        @keyframes decorOrbit3 {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) translateY(20px) scale(1.4); opacity: 1; }
        }
        
        @keyframes decorOrbit4 {
            0%, 100% { transform: translateY(-50%) translateX(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-50%) translateX(-20px) scale(1.4); opacity: 1; }
        }
        
        .btn-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 182, 193, 0.4);
            animation: ringRotate 8s linear infinite;
            pointer-events: none;
        }
        
        .btn-ring:nth-child(2) {
            width: 200px;
            height: 200px;
            border-color: rgba(152, 216, 200, 0.3);
            animation-duration: 12s;
            animation-direction: reverse;
        }
        
        @keyframes ringRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .result-name {
                font-size: 42px;
                letter-spacing: 5px;
            }
            
            .result-desc {
                font-size: 15px;
                padding: 18px 22px;
                max-width: 90%;
                border-radius: 25px;
            }
            
            .tools .toggle-btn {
                width: 140px;
                height: 140px;
                font-size: 18px;
            }
            
            .tools .toggle-btn .btn-icon {
                width: 35px;
                height: 35px;
            }
            
            .tools .toggle-btn .btn-text {
                font-size: 17px;
            }
            
            .btn-decorations {
                width: 190px;
                height: 190px;
            }
            
            .btn-decoration {
                font-size: 15px;
            }
            
            .btn-ring {
                width: 160px;
                height: 160px;
            }
            
            .btn-ring:nth-child(2) {
                width: 180px;
                height: 180px;
            }
            
            .cloud-1, .cloud-2, .cloud-3 {
                transform: scale(0.6);
            }
            
            .sparkle::before {
                height: 12px;
            }
            
            .sparkle::after {
                width: 12px;
            }
            
            .bg-circle-1 {
                width: 250px;
                height: 250px;
            }
            
            .bg-circle-2 {
                width: 200px;
                height: 200px;
            }
            
            .bg-circle-3 {
                width: 150px;
                height: 150px;
            }
            
            .pony {
                font-size: 22px;
            }
            
            .flying-pony {
                font-size: 18px;
            }
            
            .hoofprint {
                font-size: 12px;
            }
            
            .pony-star {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>
    
    <div class="rainbow"></div>
    
    <div class="clouds-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    
    <div class="bubbles-container">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
        <div class="bubble bubble-6"></div>
    </div>
    
    <div class="sparkles-container">
        <div class="sparkle sparkle-1"></div>
        <div class="sparkle sparkle-2"></div>
        <div class="sparkle sparkle-3"></div>
        <div class="sparkle sparkle-4"></div>
        <div class="sparkle sparkle-5"></div>
        <div class="sparkle sparkle-6"></div>
        <div class="sparkle sparkle-7"></div>
        <div class="sparkle sparkle-8"></div>
    </div>
    
    <div class="hearts-container">
        <div class="floating-heart heart-1">💕</div>
        <div class="floating-heart heart-2">💗</div>
        <div class="floating-heart heart-3">💖</div>
        <div class="floating-heart heart-4">💝</div>
        <div class="floating-heart heart-5">💕</div>
        <div class="floating-heart heart-6">💗</div>
    </div>
    
    <div class="ponies-container">
        <div class="pony pony-1">🐴</div>
        <div class="pony pony-2">🦄</div>
        <div class="pony pony-3">🐎</div>
        <div class="flying-pony flying-pony-1">🦄</div>
        <div class="flying-pony flying-pony-2">🐴</div>
    </div>
    
    <div class="hoofprints-container">
        <div class="hoofprint hoofprint-1">🧿</div>
        <div class="hoofprint hoofprint-2">🧿</div>
        <div class="hoofprint hoofprint-3">🧿</div>
        <div class="hoofprint hoofprint-4">🧿</div>
        <div class="hoofprint hoofprint-5">🧿</div>
        <div class="hoofprint hoofprint-6">🧿</div>
        <div class="hoofprint hoofprint-7">🧿</div>
        <div class="hoofprint hoofprint-8">🧿</div>
    </div>
    
    <div class="pony-stars-container">
        <div class="pony-star pony-star-1">⭐</div>
        <div class="pony-star pony-star-2">✨</div>
        <div class="pony-star pony-star-3">💫</div>
        <div class="pony-star pony-star-4">🌟</div>
    </div>

    <div id="main" class="wall"></div>
    <div id="result" class="result"></div>
    
    <div id="tools" class="tools">
        <div class="toggle-btn-wrapper">
            <div class="btn-ring"></div>
            <div class="btn-ring"></div>
            <div class="btn-decorations">
                <span class="btn-decoration">🐴</span>
                <span class="btn-decoration">🌸</span>
                <span class="btn-decoration">🦄</span>
                <span class="btn-decoration">🎀</span>
            </div>
            <button
               class="pure-button toggle-btn"
               @click="toggle"
               :class="{'button-secondary': !running, 'button-success': running}">
               <svg v-if="!running" class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                 <path d="M8 5v14l11-7z"/>
               </svg>
               <svg v-else class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                 <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
               </svg>
               <span class="btn-text">{{running?'停止':'抽取'}}</span>
            </button>
        </div>
    </div>

    <script type="text/javascript" src="js/zepto.js"></script>
    <script type="text/javascript" src="js/vue.js"></script>
    <script type="text/javascript" src="js/tagcanvas.js"></script>
    <script type="text/javascript" src="js/member.js"></script>
    <script type="text/javascript">
        (function(){
            var speed = function(){
                return [0.1 * Math.random() + 0.01, -(0.1 * Math.random() + 0.01)];
            };
            var createHTML = function(){
                var html = [ '<ul>' ];
                member.forEach(function(item, index){
                    item.index = index;
                    html.push('<li><a href="#" style="color: #FF6B9D;">' + item.name + '</a></li>');
                });
                html.push('</ul>');
                return html.join('');
            };
            var lottery = function(){
                var list = canvas.getElementsByTagName('a');
                var color = '#FFD700';
                var ret = member
                    .map(function(m){
                        return Object.assign({
                          score: Math.random()
                        }, m);
                    })
                    .sort(function(a, b){
                        return a.score - b.score;
                    })
                    .slice(0, 1)
                    .map(function(m){
                      list[m.index].style.color = color;
                      return '<div class="result-name">' + m.name + '</div><div class="result-desc">寓意: ' + m.description + '</div>'; 
                    });
                return ret;
            };
            var canvas = document.createElement('canvas');
            canvas.id = 'myCanvas';
            canvas.width = document.body.offsetWidth;
            canvas.height = document.body.offsetHeight;
            document.getElementById('main').appendChild(canvas);
            new Vue({
                el: '#tools',
                data: {
                    running: false
                },
                mounted () {
                    canvas.innerHTML = createHTML();
                    TagCanvas.Start('myCanvas', '', {
                        textColour: null,
                        initial: speed(),
                        dragControl: 1,
                        textHeight: 14
                    });
                },
                methods: {
                    toggle: function(){
                        if(this.running){
                            TagCanvas.SetSpeed('myCanvas', speed());
                            var ret = lottery();
                            $('#result').css('display', 'block').html(ret.join(''));
                            TagCanvas.Reload('myCanvas');
                            setTimeout(function(){
                                $('#main').addClass('mask');
                            }, 300);
                        } else {
                            $('#result').css('display', 'none');
                            $('#main').removeClass('mask');
                            TagCanvas.SetSpeed('myCanvas', [5, 1]);
                        }
                        this.running = !this.running;
                    }
                }
            });
        })();
    </script>
</body>
</html>
